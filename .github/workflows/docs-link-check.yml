name: Documentation Link Check

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - '**/*.md'
      - '.github/markdown-link-check-config.json'
      - 'tools/no_broad_ignorepatterns.py'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - '**/*.md'
      - '.github/markdown-link-check-config.json'

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Check ignorePatterns policy
        run: python tools/no_broad_ignorepatterns.py

      - name: Check links in documentation
        uses: gaurav-nelson/github-action-markdown-link-check@3c3b66f1f7d0900e37b71eca45b63ea9eedfce31 # v1.0.17
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'
