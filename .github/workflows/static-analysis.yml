name: Static Analysis (Bandit)

# Self-contained Python SAST. Replaces the CodeQL workflow, whose SARIF
# upload step requires GitHub Advanced Security — unavailable on this
# private repository, which is why every CodeQL run failed at upload.
# Bandit needs no special repo settings and gates on real findings only.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.py'
  push:
    branches: [main]
    paths:
      - '**/*.py'

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Install bandit
        run: pip install bandit==1.7.9

      - name: Run bandit (fail on medium+ severity)
        run: |
          bandit -r core plasticity ai_integration data validation \
            --severity-level medium --confidence-level medium
