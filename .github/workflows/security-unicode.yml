name: Security - Unicode Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unicode-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Run Unicode scan
        shell: bash
        run: |
          python scripts/unicode_scan.py | tee unicode_scan_report.txt
          exit "${PIPESTATUS[0]}"

      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unicode-scan-report
          path: unicode_scan_report.txt
          retention-days: 14
